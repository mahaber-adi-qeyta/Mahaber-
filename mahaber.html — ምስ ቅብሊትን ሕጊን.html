<!DOCTYPE html>
<html lang="ti">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ማሓበር ዓዲ ቀይታ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#f1f3f4;min-height:100vh;}
#app{max-width:600px;margin:0 auto;}
button,input,textarea{font-family:inherit;}

.topbar{background:#1a73e8;color:#fff;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.church-name{font-weight:bold;font-size:15px;cursor:pointer;}
.sub-info{font-size:11px;opacity:.8;margin-top:2px;display:flex;align-items:center;gap:6px;}
.badge{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:10px;}
.badge-warn{background:rgba(255,0,0,.3);}
.topbar-btns{display:flex;gap:5px;}
.tbtn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;padding:6px 9px;border-radius:6px;font-size:12px;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{padding:5px 10px;border-radius:20px;border:none;font-size:11px;}
.tab.active{background:#fff;color:#1a73e8;font-weight:bold;}
.tab.inactive{background:rgba(255,255,255,.18);color:#fff;}

.panel{background:#fff;margin:8px 12px;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.1);border:1px solid #dadce0;}
.panel-title{font-weight:bold;color:#1a73e8;margin-bottom:10px;font-size:14px;}
.warn-box{font-size:12px;color:#555;margin-bottom:10px;background:#fef9e7;padding:10px;border-radius:8px;border:1px solid #f5d56a;}
.btn-primary{background:#1a73e8;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:bold;font-size:13px;cursor:pointer;}
.btn-success{background:#188038;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:bold;font-size:13px;cursor:pointer;}
.btn-danger{background:#d93025;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-weight:bold;font-size:12px;cursor:pointer;}
.btn-grey{background:#eee;color:#555;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;}
.btn-orange{background:#e37400;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-weight:bold;font-size:12px;cursor:pointer;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

.month-nav-wrap{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 14px;}
.year-pills{display:flex;gap:4px;justify-content:center;margin-bottom:6px;flex-wrap:wrap;}
.month-pills{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;}
.pill{padding:4px 8px;border-radius:10px;border:1px solid #dadce0;font-size:11px;background:#fff;color:#555;cursor:pointer;}
.pill.active{background:#1a73e8;color:#fff;font-weight:bold;border-color:#1a73e8;}
.pill.current{border:2px solid #1a73e8;color:#1a73e8;font-weight:bold;}

.summary-row{display:flex;gap:7px;padding:10px 12px;background:#fff;border-bottom:1px solid #e0e0e0;}
.card{flex:1;border-radius:8px;padding:8px 6px;text-align:center;}
.card .val{font-size:18px;font-weight:bold;}
.card .lbl{font-size:10px;color:#666;margin-top:1px;}

.month-strip{background:#e8f0fe;padding:4px 14px;display:flex;justify-content:space-between;align-items:center;}
.arrow{background:transparent;border:none;color:#1a73e8;font-size:22px;font-weight:bold;cursor:pointer;}

.tbl-header{display:grid;grid-template-columns:26px 1fr 90px 30px 26px;background:#f1f3f4;border-bottom:2px solid #dadce0;padding:7px 12px;font-weight:bold;color:#555;font-size:11px;}
.member-row{display:grid;grid-template-columns:26px 1fr 90px 30px 26px;align-items:center;min-height:42px;}
.mem-idx{text-align:center;color:#aaa;font-size:11px;font-weight:bold;}
.mem-input{border:none;background:transparent;padding:8px 4px;font-size:13px;color:#202124;outline:none;width:100%;font-family:inherit;}
.mem-btn{margin:3px;padding:5px 0;border-radius:5px;border:none;color:#fff;font-weight:bold;font-size:11px;width:calc(100% - 6px);cursor:pointer;}
.mem-receipt{background:transparent;border:none;font-size:16px;padding:0;cursor:pointer;opacity:.6;}
.mem-receipt:hover{opacity:1;}
.mem-del{background:transparent;border:none;color:#ccc;font-size:17px;padding:0;cursor:pointer;}
.total-row{display:grid;grid-template-columns:26px 1fr 90px 30px 26px;background:#e8f0fe;border-top:2px solid #1a73e8;padding:8px 0;font-weight:bold;margin-top:2px;}
.add-btn{margin-top:10px;width:100%;padding:10px;border-radius:8px;border:2px dashed #1a73e8;background:transparent;color:#1a73e8;font-weight:bold;font-size:13px;cursor:pointer;}
.unpaid-box{margin:0 12px 12px;background:#fff3f3;border:1px solid #f5c6c2;border-radius:8px;padding:12px;}
.unpaid-title{font-weight:bold;color:#d93025;margin-bottom:6px;}
.unpaid-item{color:#c62828;font-size:12px;padding:2px 0;}

/* NOTES */
.notes-section{margin:8px 12px 4px;background:#fff;border-radius:10px;padding:14px;border:1px solid #dadce0;}
.notes-label{font-weight:bold;color:#555;font-size:12px;margin-bottom:6px;}
.notes-ta{width:100%;border:1px solid #dadce0;border-radius:8px;padding:10px;font-size:13px;resize:vertical;min-height:70px;outline:none;color:#333;font-family:inherit;}
.notes-ta:focus{border-color:#1a73e8;}
.notes-saved{font-size:11px;color:#188038;margin-top:4px;height:16px;}

/* MODAL OVERLAY */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.modal-header{background:#1a73e8;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-weight:bold;font-size:15px;}
.modal-close{background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid #eee;display:flex;gap:8px;justify-content:flex-end;}

/* RECEIPT */
.receipt{font-family:'Courier New',monospace;background:#fffef0;border:2px dashed #ccc;border-radius:8px;padding:20px;margin-bottom:16px;}
.receipt-header{text-align:center;margin-bottom:12px;border-bottom:1px dashed #ccc;padding-bottom:10px;}
.receipt-church{font-size:16px;font-weight:bold;color:#1a73e8;}
.receipt-sub{font-size:12px;color:#666;margin-top:2px;}
.receipt-row{display:flex;justify-content:space-between;margin:5px 0;font-size:13px;}
.receipt-row.bold{font-weight:bold;}
.receipt-divider{border:none;border-top:1px dashed #ccc;margin:10px 0;}
.receipt-footer{text-align:center;font-size:11px;color:#888;margin-top:10px;}
.receipt-no{font-size:11px;color:#aaa;}
.stamp{display:inline-block;border:3px solid #188038;color:#188038;font-weight:bold;padding:4px 12px;border-radius:4px;font-size:14px;transform:rotate(-8deg);margin-top:8px;letter-spacing:2px;}

/* SECTION */
.section-pad{padding:12px;}
.section-title{font-weight:bold;color:#1a73e8;margin-bottom:8px;}
.overflow-x{overflow-x:auto;}
table{border-collapse:collapse;width:100%;}
thead tr th{background:#1a73e8;color:#fff;padding:6px 4px;text-align:center;font-size:10px;white-space:nowrap;cursor:pointer;}
thead tr th.name-th{text-align:left;padding:8px 10px;min-width:90px;position:sticky;left:0;z-index:5;}
thead tr th.total-th{background:#0d47a1;}
tbody tr td{border:1px solid #fff;padding:4px 2px;text-align:center;font-size:13px;}
tbody tr td.name-td{padding:7px 10px;font-weight:bold;border-right:2px solid #dadce0;font-size:12px;position:sticky;left:0;z-index:3;}
tbody tr td.total-td{font-weight:bold;padding:7px 5px;text-align:center;}
tbody tr.even td{background:#fff;}
tbody tr.even td.name-td{background:#fff;}
tbody tr.odd td{background:#f8f9fa;}
tbody tr.odd td.name-td{background:#f8f9fa;}
tfoot tr td{font-weight:bold;padding:6px 3px;text-align:center;font-size:10px;}
tfoot tr td.name-td{background:#e8f0fe;padding:8px 10px;color:#1a73e8;position:sticky;left:0;z-index:3;}
tfoot tr{background:#e8f0fe;}
.cell-paid{background:#e6f4ea!important;cursor:pointer;}
.cell-unpaid{background:#fce8e6!important;cursor:pointer;}
.cell-cur{outline:2px inset #1a73e8;}

.member-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
.chip.active{background:#1a73e8;color:#fff;border:2px solid #1a73e8;font-weight:bold;}
.chip.inactive{background:#fff;color:#555;border:2px solid #dadce0;}
.member-month-row{display:flex;align-items:center;justify-content:space-between;border-radius:8px;padding:10px 12px;margin-bottom:5px;}
.hint{color:#888;font-size:11px;margin-top:8px;}
.edit-input{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.7);color:#fff;padding:4px 8px;border-radius:6px;font-size:14px;font-weight:bold;outline:none;width:100%;font-family:inherit;}
.amt-input{width:70px;padding:5px 8px;border:2px solid #1a73e8;border-radius:6px;font-size:14px;font-weight:bold;outline:none;color:#1a73e8;}
.settings-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.no-select{color:#888;text-align:center;padding:30px;background:#fff;border-radius:10px;}

@media print{
  body *{visibility:hidden;}
  .receipt-print,
  .receipt-print *{visibility:visible;}
  .receipt-print{position:fixed;top:0;left:0;width:100%;padding:20px;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script>
const MONTHS=["ጥሪ","ለካቲት","መጋቢት","ሚያዝያ","ግንቦት","ሰነ","ሓምለ","ነሓሰ","መስከረም","ጥቅምቲ","ሕዳር","ታህሳስ"];
const STORAGE_KEY="mahaber_v4";
const YEARS=[2024,2025,2026,2027,2028];
const NOW=new Date();
const CUR=mk(NOW.getFullYear(),NOW.getMonth()+1);

function mk(y,m){return y+"-"+String(m).padStart(2,"0");}
function parseMk(k){const[y,m]=k.split("-");return{y:+y,m:+m};}
function lbl(k){const{y,m}=parseMk(k);return MONTHS[m-1]+" "+y;}
function shiftMk(k,n){let{y,m}=parseMk(k);m+=n;while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}return mk(y,m);}
function allMonthsOfYear(y){return Array.from({length:12},(_,i)=>mk(y,i+1));}
function nowDateStr(){return NOW.toLocaleDateString("ti",{year:"numeric",month:"long",day:"numeric"});}
function receiptNo(){return"RCP-"+Date.now().toString().slice(-6);}
function pad2(n){return String(n).padStart(2,"0");}
function timeStr(){return pad2(NOW.getHours())+":"+pad2(NOW.getMinutes());}

const DEFAULT={churchName:"ማሓበር ዓዲ ቀይታ",amount:10,members:[{id:1,name:""},{id:2,name:""},{id:3,name:""}],payments:{},notes:{},memberNotes:{}};

function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));return true;}catch(e){return false;}}

let S={
  data:load()||JSON.parse(JSON.stringify(DEFAULT)),
  activeMonth:CUR,view:"month",selectedId:null,
  showSettings:false,showExport:false,
  editingChurch:false,editingAmount:false,
  navYear:NOW.getFullYear(),
  saveStatus:"idle",
  importPending:"",importError:"",
  modal:null, // {type:"receipt"|"notes-month"|"notes-member", ...}
  notesSaved:false
};

// Ensure new fields exist on old data
if(!S.data.notes)S.data.notes={};
if(!S.data.memberNotes)S.data.memberNotes={};

let saveTimer=null,noteTimer=null;
function saveData(){
  const ok=save(S.data);
  S.saveStatus=ok?"saved":"failed";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{S.saveStatus="idle";render();},2000);
}

function isPaid(id,k){return!!S.data.payments[id+"-"+k];}
function togglePay(id,k){
  const key=id+"-"+k;
  S.data.payments[key]=!S.data.payments[key];
  saveData();render();
}
function updateName(id,val){S.data.members=S.data.members.map(m=>m.id===id?{...m,name:val}:m);saveData();render();}
function addMember(){const id=S.data.members.length?Math.max(...S.data.members.map(m=>m.id))+1:1;S.data.members.push({id,name:""});saveData();render();}
function removeMember(id){S.data.members=S.data.members.filter(m=>m.id!==id);saveData();render();}

function saveNote(key,val,isGlobal){
  if(isGlobal)S.data.notes[key]=val;
  else S.data.memberNotes[key]=val;
  saveData();
  S.notesSaved=true;
  clearTimeout(noteTimer);
  noteTimer=setTimeout(()=>{S.notesSaved=false;render();},1500);
}

function relevantMonths(){
  const rec=new Set(Object.keys(S.data.payments).map(k=>{const p=k.split("-");return mk(p[0],parseInt(p[1]));}));
  const near=[];for(let i=-3;i<=6;i++)near.push(shiftMk(CUR,i));
  return[...new Set([...near,...rec])].sort();
}

function exportJSON(){
  const json=JSON.stringify(S.data,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="mahaber_"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(url);
}
function handleImport(){
  try{
    const p=JSON.parse(S.importPending);
    if(!p.members||!p.payments)throw new Error("bad");
    S.data={...JSON.parse(JSON.stringify(DEFAULT)),...p};
    if(!S.data.notes)S.data.notes={};
    if(!S.data.memberNotes)S.data.memberNotes={};
    S.importPending="";S.importError="";S.showExport=false;
    saveData();render();
  }catch(e){S.importError="❌ ዘይቅቡል ፋይል";render();}
}

// ── RECEIPT ──
function openReceipt(memberId,monthKey){
  const member=S.data.members.find(m=>m.id===memberId);
  const paid=isPaid(memberId,monthKey);
  S.modal={type:"receipt",member,monthKey,paid,rNo:receiptNo()};
  render();
}

function printReceipt(){
  const el=document.getElementById("receipt-content");
  if(!el)return;
  const w=window.open("","_blank","width=400,height=600");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>ቅብሊት</title>
  <style>body{font-family:'Courier New',monospace;padding:20px;background:#fffef0;}
  .receipt{border:2px dashed #ccc;padding:20px;max-width:340px;margin:0 auto;}
  .center{text-align:center;}.bold{font-weight:bold;}
  .row{display:flex;justify-content:space-between;margin:5px 0;font-size:13px;}
  hr{border:none;border-top:1px dashed #ccc;margin:10px 0;}
  .stamp{display:inline-block;border:3px solid #188038;color:#188038;font-weight:bold;padding:4px 12px;border-radius:4px;transform:rotate(-8deg);letter-spacing:2px;font-size:14px;}
  </style></head><body><div class="receipt">${el.innerHTML}</div></body></html>`);
  w.document.close();
  setTimeout(()=>{w.print();},400);
}

function shareReceipt(){
  const m=S.modal;
  if(!m)return;
  const text=`🧾 ቅብሊት — ${S.data.churchName}\n` +
    `──────────────────\n` +
    `ስም: ${m.member.name}\n` +
    `ወርሒ: ${lbl(m.monthKey)}\n` +
    `ዝኸፈሎ: $${S.data.amount}\n` +
    `ኩነታት: ✅ ተከፊሉ\n` +
    `ዕለት: ${nowDateStr()}\n` +
    `No: ${m.rNo}\n` +
    `──────────────────\n` +
    `ኣምላኽ ይሃብካ! 🙏`;
  if(navigator.share){navigator.share({title:"ቅብሊት",text});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert("ቅብሊት ተቐዲሑ ✓"));}
}

function closeModal(){S.modal=null;render();}

// ── RENDER RECEIPT MODAL ──
function renderReceiptModal(){
  const m=S.modal;
  if(!m||m.type!=="receipt")return"";
  const{member,monthKey,paid,rNo}=m;
  const receiptHTML=`
    <div class="center" style="margin-bottom:12px">
      <div style="font-size:18px;font-weight:bold;color:#1a73e8">⛪ ${S.data.churchName}</div>
      <div style="font-size:11px;color:#888;margin-top:3px">ወርሓዊ ክፍሊት ቅብሊት</div>
    </div>
    <hr/>
    <div style="display:flex;justify-content:space-between;margin:5px 0;font-size:12px"><span>ቅብሊት ቁጽሪ:</span><span style="color:#aaa">${rNo}</span></div>
    <div style="display:flex;justify-content:space-between;margin:5px 0;font-size:12px"><span>ዕለት:</span><span>${nowDateStr()}</span></div>
    <div style="display:flex;justify-content:space-between;margin:5px 0;font-size:12px"><span>ሰዓት:</span><span>${timeStr()}</span></div>
    <hr/>
    <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:14px;font-weight:bold"><span>ስም ኣባል:</span><span>${member.name||"—"}</span></div>
    <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:14px"><span>ወርሒ:</span><span>${lbl(monthKey)}</span></div>
    <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:16px;font-weight:bold"><span>ዝኸፈሎ:</span><span style="color:#188038">$${S.data.amount}</span></div>
    <hr/>
    <div style="text-align:center;margin-top:10px">
      <span class="stamp">${paid?"✅ ተከፊሉ":"❌ ኣይከፈለን"}</span>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:#888">ኣምላኽ ይሃብካ 🙏</div>`;

  return`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">🧾 ቅብሊት</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="receipt" id="receipt-content">${receiptHTML}</div>
        <div class="btn-row">
          <button class="btn-primary" onclick="printReceipt()">🖨️ Print</button>
          <button class="btn-success" onclick="shareReceipt()">📤 Share / Copy</button>
          ${!paid?`<button class="btn-orange" onclick="togglePay(${member.id},'${monthKey}');S.modal.paid=true;render()">✓ ከፊሉ ምልክት</button>`:""}
        </div>
      </div>
    </div>
  </div>`;
}

// ── RENDER NOTES MODAL ──
function openNotesModal(type,key,title){
  const existing=(type==="month"?S.data.notes:S.data.memberNotes)[key]||"";
  S.modal={type:"notes",noteType:type,key,title,val:existing};
  render();
}
function renderNotesModal(){
  const m=S.modal;
  if(!m||m.type!=="notes")return"";
  return`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">📝 ሕጊ / ሓስብ — ${m.title}</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <textarea id="notes-modal-ta" style="width:100%;min-height:140px;border:1px solid #dadce0;border-radius:8px;padding:10px;font-size:13px;resize:vertical;outline:none;font-family:inherit"
          placeholder="ሕጊ፣ ዝተሰማምዐሉ ነገር፣ ወይ ዝኾነ ሓሳብ ጸሓፍ..."
          oninput="S.modal.val=this.value">${m.val}</textarea>
        <div id="notes-modal-status" style="font-size:11px;color:#188038;height:16px;margin-top:4px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-grey" onclick="closeModal()">ዕጸው</button>
        <button class="btn-success" onclick="
          saveNote(S.modal.key,S.modal.val,S.modal.noteType==='month');
          document.getElementById('notes-modal-status').textContent='✓ ተሓዚሉ';
          setTimeout(()=>{const el=document.getElementById('notes-modal-status');if(el)el.textContent='';},1500);
        ">💾 ሓዝ</button>
      </div>
    </div>
  </div>`;
}

function cardHTML(l,v,color,bg){
  return`<div class="card" style="background:${bg};border:1px solid ${color}33"><div class="val" style="color:${color}">${v}</div><div class="lbl">${l}</div></div>`;
}

function noteBadge(key,isMonth){
  const n=(isMonth?S.data.notes:S.data.memberNotes)[key];
  return n&&n.trim()?`<span style="display:inline-block;width:8px;height:8px;background:#e37400;border-radius:50%;margin-left:4px;vertical-align:middle"></span>`:"";
}

function render(){
  const{data,activeMonth,view,navYear}=S;
  const{churchName,amount,members}=data;
  const displayMonths=relevantMonths();
  const paidCount=members.filter(m=>isPaid(m.id,activeMonth)).length;
  const unpaidCount=members.length-paidCount;
  const totalCollected=paidCount*amount;
  const unpaidNamed=members.filter(m=>!isPaid(m.id,activeMonth)&&m.name.trim());
  const selectedMember=members.find(m=>m.id===S.selectedId)||null;
  const monthNote=data.notes[activeMonth]||"";

  let html=`<div class="topbar">
    <div class="topbar-row">
      <div style="flex:1;margin-right:8px">
        ${S.editingChurch
          ?`<input class="edit-input" id="church-input" value="${churchName.replace(/"/g,'&quot;')}"/>`
          :`<div class="church-name" onclick="S.editingChurch=true;render()">⛪ ${churchName} <span style="font-size:11px;opacity:.7">✏️</span></div>`
        }
        <div class="sub-info">ወርሓዊ $${amount}
          ${S.saveStatus==="saved"?`<span class="badge">✓ ተሓዚሉ</span>`:""}
          ${S.saveStatus==="failed"?`<span class="badge badge-warn">⚠️ export ግበር</span>`:""}
        </div>
      </div>
      <div class="topbar-btns">
        <button class="tbtn" onclick="S.showExport=!S.showExport;render()">💾</button>
        <button class="tbtn" onclick="S.showSettings=!S.showSettings;render()">⚙️</button>
      </div>
    </div>
    <div class="tabs">
      ${[["month","📋 ወርሒ"],["year","📆 ዓመት"],["overview","🗓 ሓፈሻ"],["member","👤 ኣባል"]].map(([v,l])=>
        `<button class="tab ${S.view===v?"active":"inactive"}" onclick="S.view='${v}';render()">${l}</button>`
      ).join("")}
    </div>
  </div>`;

  // EXPORT
  if(S.showExport){
    html+=`<div class="panel"><div class="panel-title">💾 ዳታ ምዕቃብን ምምላስን</div>
      <div class="warn-box">⚠️ localStorage ኣብ ሓደ ሓደ browsers ይጠፍእ። ወርሓዊ export ምግባር ይምከር!</div>
      <div class="btn-row">
        <button class="btn-primary" onclick="exportJSON()">⬇️ Export JSON</button>
        <button class="btn-success" onclick="document.getElementById('file-import').click()">⬆️ Import ፋይል</button>
        <input id="file-import" type="file" accept=".json" style="display:none" onchange="var r=new FileReader();r.onload=function(e){S.importPending=e.target.result;render();};r.readAsText(this.files[0]);"/>
      </div>
      ${S.importPending?`<div style="margin-top:10px">
        <div style="font-size:12px;color:#555;margin-bottom:6px">Import ክትቅጽል ዶ?</div>
        ${S.importError?`<div style="color:#d93025;font-size:12px;margin-bottom:6px">${S.importError}</div>`:""}
        <div class="btn-row">
          <button class="btn-success" onclick="handleImport()">✓ እወ፣ ምልስ ኣቢሉ</button>
          <button class="btn-grey" onclick="S.importPending='';S.importError='';render()">ሰርዝ</button>
        </div></div>`:""}
    </div>`;
  }

  // SETTINGS
  if(S.showSettings){
    html+=`<div class="panel"><div class="panel-title">⚙️ ምቕያር</div>
      <div class="settings-row"><span style="color:#555">ወርሓዊ ክፍሊት:</span>
        ${S.editingAmount
          ?`<input class="amt-input" id="amt-input" type="number" min="1" value="${amount}"/>
            <button class="btn-success" style="padding:6px 14px;border-radius:6px" onclick="var v=parseFloat(document.getElementById('amt-input').value);if(!isNaN(v)&&v>0)S.data.amount=v;S.editingAmount=false;saveData();render();">✓ ሓዝ</button>
            <button class="btn-grey" onclick="S.editingAmount=false;render()">ሰርዝ</button>`
          :`<span style="font-weight:bold;font-size:18px;color:#1a73e8">$${amount}</span>
            <button style="background:#e8f0fe;color:#1a73e8;border:1px solid #c5d8f7;padding:5px 12px;border-radius:6px;font-weight:bold;font-size:12px;cursor:pointer" onclick="S.editingAmount=true;render()">✏️ ቀይር</button>`
        }
      </div>
    </div>`;
  }

  // ═══ MONTH VIEW ═══
  if(view==="month"){
    const ap=parseMk(activeMonth);
    html+=`<div class="month-nav-wrap">
      <div class="year-pills">${YEARS.map(y=>`<button class="pill ${ap.y===y?"active":""}" onclick="S.activeMonth='${mk(y,ap.m)}';render()">${y}</button>`).join("")}</div>
      <div class="month-pills">${MONTHS.map((mn,i)=>{const tmk=mk(ap.y,i+1);return`<button class="pill ${tmk===activeMonth?"active":""} ${tmk===CUR?"current":""}" onclick="S.activeMonth='${tmk}';render()">${mn}</button>`;}).join("")}</div>
    </div>
    <div class="summary-row">
      ${cardHTML("ኣባላት",members.length,"#1a73e8","#e8f0fe")}
      ${cardHTML("ከፊሎም ✓",paidCount,"#188038","#e6f4ea")}
      ${cardHTML("ዘይከፈሉ",unpaidCount,"#d93025","#fce8e6")}
      ${cardHTML("ዝተኣከበ","$"+totalCollected,"#e37400","#fef3e2")}
    </div>
    <div class="month-strip">
      <button class="arrow" onclick="S.activeMonth=shiftMk(S.activeMonth,-1);render()">‹</button>
      <div style="text-align:center">
        <span style="font-weight:bold;font-size:15px;color:#1a73e8">${lbl(activeMonth)}</span>
        ${activeMonth===CUR?`<span style="margin-left:6px;font-size:11px;color:#1a73e8">● ሕጂ</span>`:""}
      </div>
      <button class="arrow" onclick="S.activeMonth=shiftMk(S.activeMonth,+1);render()">›</button>
    </div>

    <div class="tbl-header"><div>#</div><div>ሽም ኣባል</div><div style="text-align:center">ኩነታት</div><div style="text-align:center">🧾</div><div></div></div>
    <div style="padding:0 12px 8px">
      ${members.map((m,i)=>{
        const paid=isPaid(m.id,activeMonth);
        return`<div class="member-row" style="background:${paid?"#e6f4ea":"#fce8e6"};border-bottom:1px solid ${paid?"#ceead6":"#f5c6c2"}">
          <div class="mem-idx">${i+1}</div>
          <input class="mem-input" value="${m.name.replace(/"/g,'&quot;')}" placeholder="ኣባል ${i+1}..." oninput="updateName(${m.id},this.value)"/>
          <button class="mem-btn" style="background:${paid?"#188038":"#d93025"}" onclick="togglePay(${m.id},'${activeMonth}')">${paid?"✓ ከፊሉ":"✗ ኣይከፈለን"}</button>
          <button class="mem-receipt" title="ቅብሊት" onclick="openReceipt(${m.id},'${activeMonth}')">🧾</button>
          <button class="mem-del" onclick="removeMember(${m.id})">×</button>
        </div>`;
      }).join("")}
      <div class="total-row">
        <div></div>
        <div style="padding-left:4px;color:#1a73e8;font-size:12px">ድምር: ${members.length} ኣባላት</div>
        <div style="text-align:center;color:#188038;font-size:13px">$${totalCollected}</div>
        <div></div><div></div>
      </div>
      <button class="add-btn" onclick="addMember()">+ ሓድሽ ኣባል ወስኽ</button>
    </div>

    ${unpaidNamed.length>0?`<div class="unpaid-box">
      <div class="unpaid-title">⚠️ ዘይከፈሉ (${unpaidNamed.length}) — $${unpaidNamed.length*amount} ይጎድል</div>
      ${unpaidNamed.map((m,i)=>`<div class="unpaid-item">${i+1}. ${m.name}</div>`).join("")}
    </div>`:""}

    <!-- MONTH NOTES -->
    <div class="notes-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-weight:bold;color:#555;font-size:12px">📝 ሕጊ / ሓሳብ — ${lbl(activeMonth)} ${noteBadge(activeMonth,true)}</div>
        <button class="btn-orange" style="padding:4px 10px;font-size:11px" onclick="openNotesModal('month','${activeMonth}','${lbl(activeMonth)}')">✏️ ጸሓፍ</button>
      </div>
      ${monthNote?`<div style="background:#fef9e7;border:1px solid #f5d56a;border-radius:8px;padding:10px;font-size:13px;color:#555;white-space:pre-wrap">${monthNote}</div>`
        :`<div style="color:#bbb;font-size:12px;font-style:italic">ሕጊ ወይ ሓሳብ ኣይተጸሓፈን — ✏️ ጸሓፍ ጠውቕ</div>`}
    </div>`;
  }

  // ═══ YEAR VIEW ═══
  if(view==="year"){
    const ymks=allMonthsOfYear(navYear);
    const yTotal=ymks.reduce((s,k)=>s+members.filter(m=>isPaid(m.id,k)).length*amount,0);
    const yPossible=members.length*12*amount;
    html+=`<div class="section-pad">
      <div style="display:flex;gap:4px;justify-content:center;margin-bottom:12px;flex-wrap:wrap">
        ${YEARS.map(y=>`<button class="pill ${navYear===y?"active":""}" onclick="S.navYear=${y};render()">${y}</button>`).join("")}
      </div>
      <div class="year-stat-row">
        ${cardHTML(navYear+" ዝተኣከበ","$"+yTotal,"#188038","#e6f4ea")}
        ${cardHTML("ዝተጸበ","$"+yPossible,"#1a73e8","#e8f0fe")}
        ${cardHTML("ዘይተሰብሰበ","$"+(yPossible-yTotal),"#d93025","#fce8e6")}
      </div>
      <div class="overflow-x">
        <table>
          <thead><tr>
            <th class="name-th">ሽም ኣባል</th>
            ${MONTHS.map((mn,i)=>{const tmk=mk(navYear,i+1);return`<th onclick="S.activeMonth='${tmk}';S.view='month';render()" style="${tmk===CUR?"border-bottom:3px solid #ffd700":""}min-width:36px">${mn.slice(0,3)}${noteBadge(tmk,true)}</th>`;}).join("")}
            <th class="total-th">ድምር</th>
          </tr></thead>
          <tbody>
            ${members.map((m,idx)=>{
              const paidMs=ymks.filter(k=>isPaid(m.id,k));
              return`<tr class="${idx%2===0?"even":"odd"}">
                <td class="name-td">${m.name||"ኣባል "+(idx+1)}</td>
                ${ymks.map(k=>{const paid=isPaid(m.id,k);return`<td class="${paid?"cell-paid":"cell-unpaid"}${k===CUR?" cell-cur":""}" onclick="togglePay(${m.id},'${k}')">${paid?"✓":"·"}</td>`;}).join("")}
                <td class="total-td" style="color:${paidMs.length===12?"#188038":paidMs.length>0?"#e37400":"#d93025"}">$${paidMs.length*amount}</td>
              </tr>`;
            }).join("")}
          </tbody>
          <tfoot><tr>
            <td class="name-td">ድምር</td>
            ${ymks.map(k=>{const pc=members.filter(m=>isPaid(m.id,k)).length;return`<td style="color:${pc===members.length?"#188038":"#d93025"}">${pc}/${members.length}</td>`;}).join("")}
            <td style="color:#1a73e8;font-weight:bold;padding:7px 5px">$${yTotal}</td>
          </tr></tfoot>
        </table>
      </div>
      <div class="hint">💡 ሓደ ክፍሊ ጠውቕ ፡ ኩነታቱ ይቕየር · ↑ ወርሒ ጠውቕ ፡ ናይ ወርሒ ዝርዝር ርኣ</div>
    </div>`;
  }

  // ═══ OVERVIEW VIEW ═══
  if(view==="overview"){
    html+=`<div class="section-pad">
      <div class="section-title">🗓 ሓፈሻዊ ሪፖርት (ኩሉ ዓመታት)</div>
      <div class="overflow-x">
        <table>
          <thead><tr>
            <th class="name-th" style="position:sticky;left:0;z-index:6">ሽም ኣባል</th>
            ${displayMonths.map(k=>{const{y,m}=parseMk(k);return`<th onclick="S.activeMonth='${k}';S.view='month';render()" style="min-width:42px;font-size:9px;${k===CUR?"border-bottom:3px solid #ffd700":""}${k===S.activeMonth?"background:#155db2":""}">${MONTHS[m-1].slice(0,3)}<br/><span style="opacity:.7">${y}</span>${noteBadge(k,true)}</th>`;}).join("")}
            <th class="total-th">ጠቕላላ</th>
          </tr></thead>
          <tbody>
            ${members.map((m,idx)=>{
              const tot=displayMonths.filter(k=>isPaid(m.id,k)).length*amount;
              return`<tr class="${idx%2===0?"even":"odd"}" style="cursor:pointer" onclick="S.selectedId=${m.id};S.view='member';render()">
                <td class="name-td" style="color:#1a73e8">${m.name||"ኣባል "+(idx+1)}</td>
                ${displayMonths.map(k=>{const paid=isPaid(m.id,k);return`<td class="${paid?"cell-paid":"cell-unpaid"}${k===CUR?" cell-cur":""}" onclick="event.stopPropagation();togglePay(${m.id},'${k}')">${paid?"✓":"·"}</td>`;}).join("")}
                <td class="total-td" style="color:#1a73e8">$${tot}</td>
              </tr>`;
            }).join("")}
          </tbody>
          <tfoot><tr>
            <td class="name-td">ድምር</td>
            ${displayMonths.map(k=>{const pc=members.filter(m=>isPaid(m.id,k)).length;return`<td style="color:${pc===members.length?"#188038":"#d93025"}">${pc}/${members.length}</td>`;}).join("")}
            <td style="color:#1a73e8;font-weight:bold">$${displayMonths.reduce((s,k)=>s+members.filter(m=>isPaid(m.id,k)).length*amount,0)}</td>
          </tr></tfoot>
        </table>
      </div>
      <div class="hint">💡 ስም ጠውቕ ↗ ናይ ኣባል ዝርዝር · ሓደ ክፍሊ ጠውቕ ፡ ቀይሮ</div>
    </div>`;
  }

  // ═══ MEMBER VIEW ═══
  if(view==="member"){
    html+=`<div class="section-pad">
      <div class="section-title">👤 ናይ ኣባል ሪፖርት</div>
      <div class="member-chips">${members.map(m=>`<button class="chip ${S.selectedId===m.id?"active":"inactive"}" onclick="S.selectedId=${m.id};render()">${m.name||"ኣባል "+m.id}${noteBadge("m"+m.id,false)}</button>`).join("")}</div>`;
    if(selectedMember){
      const allMks=YEARS.flatMap(y=>allMonthsOfYear(y));
      const paidMks=allMks.filter(k=>isPaid(selectedMember.id,k));
      const nearUnpaid=displayMonths.filter(k=>!isPaid(selectedMember.id,k));
      const ymks=allMonthsOfYear(navYear);
      const memNote=data.memberNotes["m"+selectedMember.id]||"";
      html+=`<div style="display:flex;gap:7px;margin-bottom:12px">
        ${cardHTML("ዝኸፈሎ ወርሓት",paidMks.length,"#188038","#e6f4ea")}
        ${cardHTML("ዘይከፈሎ (ቀረባ)",nearUnpaid.length,"#d93025","#fce8e6")}
        ${cardHTML("ጠቕላላ","$"+(paidMks.length*amount),"#e37400","#fef3e2")}
      </div>

      <!-- Member note -->
      <div class="notes-section" style="margin:0 0 10px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:bold;color:#555;font-size:12px">📝 ብዛዕባ ${selectedMember.name||"ኣባል"} ${noteBadge("m"+selectedMember.id,false)}</div>
          <button class="btn-orange" style="padding:4px 10px;font-size:11px" onclick="openNotesModal('member','m${selectedMember.id}','${(selectedMember.name||"ኣባል").replace(/'/g,"\\'")}')">✏️ ጸሓፍ</button>
        </div>
        ${memNote?`<div style="background:#fef9e7;border:1px solid #f5d56a;border-radius:8px;padding:10px;font-size:13px;color:#555;white-space:pre-wrap">${memNote}</div>`
          :`<div style="color:#bbb;font-size:12px;font-style:italic">ሕጊ ወይ ሓሳብ ኣይተጸሓፈን</div>`}
      </div>

      <div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">
        ${YEARS.map(y=>`<button class="pill ${navYear===y?"active":""}" onclick="S.navYear=${y};render()">${y}</button>`).join("")}
      </div>
      ${ymks.map(k=>{
        const paid=isPaid(selectedMember.id,k);
        const isCur=k===CUR;
        return`<div class="member-month-row" style="background:${paid?"#e6f4ea":"#fce8e6"};border:${isCur?"2":"1"}px solid ${paid?"#ceead6":"#f5c6c2"};${isCur?"box-shadow:0 0 0 2px #1a73e833":""}">
          <div>
            <div style="font-weight:bold;color:#333">${lbl(k)}</div>
            ${isCur?`<div style="font-size:10px;color:#1a73e8">● ሕጂ ዘሎ ወርሒ</div>`:""}
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${paid?`<span style="color:#188038;font-size:12px;font-weight:bold">$${amount}</span>`:""}
            <button class="${paid?"btn-success":"btn-danger"}" style="padding:5px 10px" onclick="togglePay(${selectedMember.id},'${k}')">${paid?"✓ ከፊሉ":"✗ ኣይከፈለን"}</button>
            <button style="background:#fff8e1;border:1px solid #f5d56a;color:#e37400;padding:5px 8px;border-radius:6px;font-size:13px;cursor:pointer" onclick="openReceipt(${selectedMember.id},'${k}')" title="ቅብሊት">🧾</button>
          </div>
        </div>`;
      }).join("")}`;
    }else{
      html+=`<div class="no-select">☝️ ናይ ኣባል ስም ምረጽ</div>`;
    }
    html+=`</div>`;
  }

  document.getElementById("app").innerHTML=html;
  document.getElementById("modal-root").innerHTML=S.modal?(S.modal.type==="receipt"?renderReceiptModal():renderNotesModal()):"";

  // Bind church input
  if(S.editingChurch){
    const inp=document.getElementById("church-input");
    if(inp){
      inp.focus();
      inp.addEventListener("blur",()=>{S.data.churchName=inp.value;S.editingChurch=false;saveData();render();});
      inp.addEventListener("keydown",e=>{if(e.key==="Enter"){S.data.churchName=inp.value;S.editingChurch=false;saveData();render();}});
    }
  }
}

render();
</script>
</body>
</html>
